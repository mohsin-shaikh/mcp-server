services:
  otel-collector:
    image: otel/opentelemetry-collector:0.120.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
